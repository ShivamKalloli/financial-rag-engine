[pytest]
testpaths = tests
asyncio_mode = auto
log_cli = true
log_cli_level = WARNING

markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (real FAISS, mock LLM)
    slow: Slow tests (eval suite, load test) — skip unless RUN_EVAL=true

addopts =
    --strict-markers
    -p no:warnings

[coverage:run]
source = app
omit =
    app/__init__.py
    */tests/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
